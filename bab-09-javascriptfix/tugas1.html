<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tugas1</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
      <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <nav class="navbar sticky-top px-0">
      <div class="container-lg">
        <a class="navbar-brand mb-0 h1">
          <i
            class="bi bi-check2-square me-2"
            style="color: var(--clr-accent); font-style: normal"
          ></i>
          To-Do <em>List</em>
        </a>
        <div class="d-flex align-items-center gap-2">
          <button
            class="btn btn-sm ms-1" onclick="alert('Hiiii, SEGERA SELESAIKAN TUGAS TRPL UGGULMU! \n\nJangan lupa untuk selalu mengerjakan tugas tepat waktu yaa! \n\nSemangat belajar dan tetap produktif! 💪'); console.log('⚠ alert() — panel info dibuka');" 
            style=" border: 1px solid var(--clr-border); border-radius: 8px; color: var(--clr-muted); font-size: 0.78rem; background: none;">           
            <i class="bi bi-info-circle"></i>
          </button> 
          <!-- //JavaScript inline untuk menampilkan alert info tugas TRPL Uggul -->
        </div>
      </div>
    </nav>

    <div class="container-lg py-4">
    <!-- ── HERO ── -->
    <div class="py-4 mb-2 au">
      <h1 class="hero-title mb-2">
        Kelola <em>Tugasmu</em><br>dengan Lebih Mudah.
      </h1>
      <p class="mb-3" style="color:var(--clr-muted); font-size:.88rem; font-weight:300;">
        <i class="bi bi-mortarboard me-1"></i>
        PPW1 · Praktikum JavaScript — Embed · Inline · Eksternal
      </p>
    </div>

    <div class="container mt-5">
      <div class="container mt-5" style="max-width: 500px">
        <h2 class="mb-4">📝 Tugas TRPL Uggul</h2>
        <div class="input-group mb-3">
          <input
            type="text"
            id="inputTugas"
            class="form-control"
            placeholder="Tambah tugas baru..."
          />
          <button class="btn btn-primary" id="btnTambah">Tambah</button>
        </div>
        <ul class="list-group" id="daftarTugas"></ul>
        <p class="text-muted mt-2" id="info">Tidak ada tugas</p>
      </div>
    </div>
    
    <script src="tugas1.js"></script>
    
    <script>
        // JavaScript embed untuk mengelola daftar tugas TRPL Uggul
      const input = document.getElementById("inputTugas");
      const btnTambah = document.getElementById("btnTambah");
      const daftar = document.getElementById("daftarTugas");
      const info = document.getElementById("info");
      let jumlah = 0;

      function perbaruiInfo() {
        info.textContent =
          jumlah === 0 ? "Tidak ada tugas" : jumlah + " tugas tersisa";
      }

      function tambahTugas() {
        const teks = input.value.trim();
        if (teks === "") {
          alert("Tugas tidak boleh kosong!");
          return;
        }
        const li = document.createElement("li");
        li.className =
          "list-group-item d-flex justify-content-between align-items-center";

        const span = document.createElement("span");
        span.textContent = teks;
        span.style.cursor = "pointer";
        span.title = "Klik untuk tandai selesai";
        span.addEventListener("click", () => {
          const done = span.style.textDecoration === "line-through";
          span.style.textDecoration = done ? "none" : "line-through";
          span.style.opacity = done ? "1" : "0.5";
        });

        const btnHapus = document.createElement("button");
        btnHapus.textContent = "×";
        btnHapus.className = "btn btn-sm btn-outline-danger";
        btnHapus.addEventListener("click", () => {
          li.remove();
          jumlah--;
          perbaruiInfo();
        });

        li.appendChild(span);
        li.appendChild(btnHapus);
        daftar.appendChild(li);
        input.value = "";
        input.focus();
        jumlah++;
        perbaruiInfo();
      }

      btnTambah.addEventListener("click", tambahTugas);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") tambahTugas();
      });
    </script>
  </body>
</html>
