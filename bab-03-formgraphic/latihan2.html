<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown</title>
</head>
<body>
    <!-- Element <select> digunakan untuk membuat daftar dropdown -->
    <form>
        <label for="cars">Choose a car:</label>
        <select id="cars" name="cars">
            <option value="volvo">pajero</option>
            <option value="saab">Fortuner</option>
            <option value="fiat">Alpard</option>
            <option value="audi">Toyota</option>
        </select>
    </form>
</body>
</html>
